services:
  - type: web
    name: hackerhood-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
